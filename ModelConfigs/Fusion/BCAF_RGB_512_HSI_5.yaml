# ═══════════════════════════════════════════════════════════
# CONFIGURE — change these to train on a new dataset / setup
# ═══════════════════════════════════════════════════════════

dataset_name: "SpectralWaste"        # ← your dataset name
modality: "rgb_hsi"
model_type: "featurefusion"

rgb_model_config_path: "ModelConfigs/RGB/swin_t_RGB_512.yaml"            # ← RGB sub-model config
rgb_checkpoint_path: "models/paper/swin_t_SpectralWaste_rgb_512_best.pth"  # ← RGB checkpoint

hsi_model_config_path: "ModelConfigs/HSI/adapted_swin_t_HSI_5.yaml"                  # ← HSI sub-model config
hsi_checkpoint_path: "models/paper/adapted_swin_t_SpectralWaste_hsi_5_best.pth"       # ← HSI checkpoint

_rgb_size: &rgb_size 512             # ← RGB image size
_hsi_size: &hsi_size 256             # ← HSI image size
_in_chans: &in_chans 225             # ← Padded HSI channels (>= raw channel count). Must match hsi_model_config (in_chans).

_batch_size: &batch_size 2           # ← samples per GPU
_epochs: &epochs 5                   # ← total training epochs
_checkpoint_dir: &checkpoint_dir "./models/checkpoints/BCAF_rgb512_hsi5"  # ← save path
_save_interval: &save_interval 1     # ← save every N epochs (0 = only best)

hardware:
  gpu: "0"                           # ← GPU index

# ═══════════════════════════════════════════════════════════
# FIXED — safe defaults, no need to change
# ═══════════════════════════════════════════════════════════

data_loading:
  num_workers: 4
  pin_memory: True
  prefetch_factor: 2
  persistent_workers: True
  drop_last: True

augmentation:
  enable: True        # master switch for all augmentations below
  rgb_normalization:
    enable: True
    method: "imagenet"
  hsi_normalization:
    enable: True
    method: "standardize"
  pad_channels:
    enable: True
    pad_channels_to: *in_chans
  resize_rgb:
    enable: True
    size: *rgb_size
  resize_hsi:
    enable: True
    size: *hsi_size
  random_rotate:
    enable: True
    degrees: [-5, 5]
  random_scale:
    enable: True
    scale_limit: [0.8, 1.3]
  random_crop_rgb:
    enable: True
    size: *rgb_size
  random_crop_hsi:
    enable: True
    size: *hsi_size
  random_flip:
    enable: True
    p_horizontal: 0.5
    p_vertical: 0.5
  rgb_color_jitter:
    enable: True
    p: 0.8
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.03

fusion:
  fusion_stages: [0, 1, 2, 3]  # which backbone stages to apply cross-attention
  num_cross_attention_layers: 1

head:
  decoder_channels: [256, 128, 64]
  dropout: 0.1

training:
  batch_size: *batch_size
  epochs: *epochs
  checkpoint_dir: *checkpoint_dir
  save_checkpoint_interval: *save_interval
  random_seed: 40
  warmup_epochs: 5
  learning_rate: 1.0e-4
  lr_factors:
    head: 1.0
    backbone_pretrained: 0.1
    backbone_random: 1.0
  weight_decay: 0.01
  gradient_accumulation_steps: 4
  clip_grad_norm: 0
  amp: True
  lr_scheduler:
    type: "poly"
    params:
      power: 0.9
  loss:
    type: "ce_dice"
    ce_weight: 0.5
    dice_weight: 1.5
    weighting:
      strategy: "frequency"

wandb:
  enable: False                       # ← set False to disable W&B logging
  project: "BCAF_2026_SpectralWaste"
  run_name: "BCAF_rgb512_hsi5"

visualization:  # for W&B
  max_images: 4
  log_interval: 1